<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>登录 - 任务管理</title>
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; 
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      margin: 0 0 30px 0;
      text-align: center;
      color: #333;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #5568d3;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .error-message {
      color: #dc3545;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }
    .success-message {
      color: #28a745;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>任务管理系统</h2>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" />
      </div>
      <button type="submit" id="loginBtn">登录</button>
      <div id="message" class="error-message"></div>
    </form>
  </div>

  <script>
    function showMessage(text, isError = true) {
      const msgEl = document.getElementById('message');
      msgEl.textContent = text;
      msgEl.className = isError ? 'error-message' : 'success-message';
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      
      if (!username || !password) {
        showMessage('请输入用户名和密码');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = '登录中...';
      showMessage('');

      try {
        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);

        const response = await fetch('/ui/login', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (response.ok && data.code === 200) {
          showMessage('登录成功，正在跳转...', false);
          setTimeout(() => {
            window.location.href = '/ui/jobs';
          }, 500);
        } else {
          showMessage(data.msg || '登录失败，请检查用户名和密码');
          loginBtn.disabled = false;
          loginBtn.textContent = '登录';
        }
      } catch (error) {
        showMessage('登录失败: ' + error.message);
        loginBtn.disabled = false;
        loginBtn.textContent = '登录';
      }
    }
  </script>
</body>
</html>
